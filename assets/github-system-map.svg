<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="surface" x1="24" y1="24" x2="1176" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07121D"/>
      <stop offset="0.55" stop-color="#0E2231"/>
      <stop offset="1" stop-color="#173848"/>
    </linearGradient>
    <linearGradient id="card" x1="72" y1="78" x2="1128" y2="346" gradientUnits="userSpaceOnUse">
      <stop stop-color="#132A39"/>
      <stop offset="1" stop-color="#10212E"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14C1B0"/>
      <stop offset="1" stop-color="#F2B544"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="1160" height="380" rx="28" fill="url(#surface)"/>
  <text x="64" y="84" fill="#F8F5EF" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">System map</text>
  <text x="64" y="116" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Du serveur Discord jusqu'a la persistance distante, avec les couches clefs du bot.</text>

  <path d="M302 226H374" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M602 226H674" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M902 226H974" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M362 212L374 226L362 240" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M662 212L674 226L662 240" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M962 212L974 226L962 240" stroke="url(#line)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#softShadow)">
    <rect x="56" y="150" width="246" height="154" rx="22" fill="url(#card)" stroke="#F4F0E8" stroke-opacity="0.12"/>
    <text x="84" y="188" fill="#F2B544" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">01 / DISCORD SERVER</text>
    <text x="84" y="226" fill="#F8F5EF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Users and channels</text>
    <text x="84" y="262" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">DMs, tickets, organisation,</text>
    <text x="84" y="288" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">annonces, roles and guild flows.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="356" y="150" width="246" height="154" rx="22" fill="url(#card)" stroke="#F4F0E8" stroke-opacity="0.12"/>
    <text x="384" y="188" fill="#14C1B0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">02 / BOT CORE</text>
    <text x="384" y="226" fill="#F8F5EF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">main.py + cogs</text>
    <text x="384" y="262" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">Command routing, intents,</text>
    <text x="384" y="288" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">views, modals and listeners.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="656" y="150" width="246" height="154" rx="22" fill="url(#card)" stroke="#F4F0E8" stroke-opacity="0.12"/>
    <text x="684" y="188" fill="#F2B544" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">03 / DOMAIN MODULES</text>
    <text x="684" y="226" fill="#F8F5EF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Guild logic</text>
    <text x="684" y="262" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">activite, organisation, event,</text>
    <text x="684" y="288" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">job, players, stats, up, welcome.</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="956" y="150" width="188" height="154" rx="22" fill="url(#card)" stroke="#F4F0E8" stroke-opacity="0.12"/>
    <text x="984" y="188" fill="#14C1B0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">04 / RUNTIME</text>
    <text x="984" y="226" fill="#F8F5EF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">Persistence + AI</text>
    <text x="984" y="262" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">#console snapshots,</text>
    <text x="984" y="288" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500">OpenAI, Gemini, Render.</text>
  </g>
</svg>
