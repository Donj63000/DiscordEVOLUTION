      <stop stop-color="#08131F"/>
      <stop offset="0.52" stop-color="#0F2432"/>
      <stop offset="1" stop-color="#173848"/>
    </linearGradient>
    <radialGradient id="tealGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(962 170) rotate(128.4) scale(364 428)">
