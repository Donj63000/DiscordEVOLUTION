    <text x="912" y="338" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="500">Activities, event planning, jobs,</text>
    <text x="912" y="366" fill="#A6C8D1" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="500">profiles, promotions and stats.</text>

