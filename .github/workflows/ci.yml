name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} test suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.11'
          - '3.12'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest-cov

      - name: Compile Python sources
        run: |
          python -m compileall -q \
            main.py \
            *.py \
            cogs \
            models \
            tests \
            utils

      - name: Run strict pytest suite
        run: |
          mkdir -p artifacts
          python -m pytest \
            -W error::pytest.PytestDeprecationWarning \
            --junitxml=artifacts/pytest-${{ matrix.python-version }}.xml \
            --cov=. \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:artifacts/coverage-${{ matrix.python-version }}.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-py${{ matrix.python-version }}
          path: artifacts/
          if-no-files-found: error
